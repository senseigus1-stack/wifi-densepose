version: '3.8'

services:
  wifi-densepose:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: wifi-densepose
    restart: unless-stopped
    ports:
      - "5566:5566/udp"
      - "3000:3000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    networks:
      - wifi-sensing

networks:
  wifi-sensing:
    driver: bridge